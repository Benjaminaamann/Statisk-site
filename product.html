<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FashionRus - Product</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="product" id="top">
    <header class="site-header">
      <div class="container header-inner">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Categories</a>
          <a href="productlist.html">Brands</a>
          <a href="productlist.html">Seasons</a>
        </nav>

        <a class="logo" href="index.html">Fashion<span class="r">R</span>us</a>
      </div>
    </header>

    <main class="container">
      <div class="page-top">
        <a class="back-link" href="productlist.html">← Back to product list</a>
        <span></span>
      </div>

      <section class="product-layout" aria-label="Product details">
        <!-- Left: image card -->
        <div class="product-image-card">
          <img class="product-image" src="" alt="" />
        </div>

        <!-- Right: info card -->
        <div class="product-info-card">
          <p class="breadcrumb product-breadcrumb"></p>

          <h1 class="product-title"></h1>

          <!-- Optional short description (if you use it in JS) -->
          <p class="product-desc product-shortdesc"></p>

          <p class="product-price-line">
            <span class="product-price-now product-price"></span>
            <span class="product-price-old product-old-price"></span>
          </p>

          <p class="stock product-stock"></p>

          <!-- If your API description is HTML, keep it in a div -->
          <div class="product-desc product-description"></div>

          <ul class="product-specs">
            <li><strong>Brand:</strong> <span class="spec-brand"></span></li>
            <li>
              <strong>Category:</strong> <span class="spec-category"></span>
            </li>
            <li><strong>Type:</strong> <span class="spec-type"></span></li>
            <li><strong>Season:</strong> <span class="spec-season"></span></li>
            <li><strong>Gender:</strong> <span class="spec-gender"></span></li>
          </ul>

          <!-- Optional buy row (only if your JS already supports it) -->
          <div class="buy-row">
            <select aria-label="Choose size">
              <option selected disabled>Select</option>
              <option>XS</option>
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>XL</option>
            </select>
            <button class="add-to-basket" type="button">Add to basket</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>FashionRus • Benjamin Jaffe Aamann</small>
        <a href="#top">To the top</a>
      </div>
    </footer>

    <script src="product.js"></script>
  </body>
</html>
