<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FashionRus - Product</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="product" id="top">
    <header class="site-header">
      <div class="container header-inner">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Categories</a>
          <a href="productlist.html">Brands</a>
          <a href="productlist.html">Seasons</a>
        </nav>

        <a class="logo" href="index.html">Fashion<span class="r">R</span>us</a>
      </div>
    </header>

    <main class="container">
      <a class="back-link" href="productlist.html">← Back to product list</a>

      <section class="product-page" aria-label="Product details">
        <div class="product-image-box">
          <img class="product-image" src="" alt="" />
        </div>

        <div class="product-info-box">
          <p class="product-breadcrumb"></p>

          <h1 class="product-title"></h1>

          <p class="product-price-line">
            <span class="product-price"></span>
            <span class="product-old-price"></span>
          </p>

          <p class="product-stock"></p>

          <div class="product-description"></div>

          <ul class="product-specs">
            <li><strong>Brand:</strong> <span class="spec-brand"></span></li>
            <li>
              <strong>Category:</strong> <span class="spec-category"></span>
            </li>
            <li><strong>Type:</strong> <span class="spec-type"></span></li>
            <li><strong>Season:</strong> <span class="spec-season"></span></li>
            <li><strong>Gender:</strong> <span class="spec-gender"></span></li>
          </ul>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>FashionRus • Benjamin Jaffe Aamann</small>
        <a href="#top">To the top</a>
      </div>
    </footer>

    <script src="product.js"></script>
  </body>
</html>
