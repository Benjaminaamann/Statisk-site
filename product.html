<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-left">
        <nav class="main-nav">
          <a href="index.html">CATEGORIES</a>
          <a href="#">BRANDS</a>
          <a href="#">SEASONS</a>
        </nav>
      </div>

      <a class="logo" href="index.html"> FASHION<span>R</span>US </a>

      <div class="header-right">
        <button class="icon-btn">🔍</button>
        <button class="icon-btn">♡</button>
        <button class="icon-btn">🛒</button>
      </div>
    </header>

    <a href="productlist.html">Back to product list</a>

    <section class="product-layout">
      <div>
        <img class="product-image product-image-big" />
      </div>

      <div>
        <p class="product-breadcrumb"></p>

        <h1 class="product-title"></h1>

        <p>
          <span class="product-price"></span>
          <span class="product-old-price"></span>
        </p>

        <p class="product-stock"></p>

        <div class="product-description"></div>

        <ul>
          <li>Brand: <span class="spec-brand"></span></li>
          <li>Category: <span class="spec-category"></span></li>
          <li>Type: <span class="spec-type"></span></li>
          <li>Season: <span class="spec-season"></span></li>
          <li>Gender: <span class="spec-gender"></span></li>
        </ul>

        <div class="buy-row">
          <select>
            <option>Select</option>
            <option>XS</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>

          <button class="add-to-basket">Add to basket</button>
        </div>
      </div>
    </section>

    <footer class="site-footer">
      <div class="newsletter">
        <input placeholder="E-MAIL" />
        <button>SIGN UP</button>
      </div>

      <div class="footer-bottom">
        <small>FashionRus • Benjamin Jaffe Aamann</small>
        <a href="#top">To the top</a>
      </div>
    </footer>

    <script src="product.js"></script>
  </body>
</html>
