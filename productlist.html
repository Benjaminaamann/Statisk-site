<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FashionRus - Product List</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="productlist" id="top">
    <header class="site-header">
      <div class="container header-inner">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Categories</a>
          <a href="productlist.html?category=Accessories">Brands</a>
          <a href="productlist.html?category=Apparel">Seasons</a>
        </nav>

        <a class="logo" href="index.html">Fashion<span class="r">R</span>us</a>
      </div>
    </header>

    <main class="container">
      <div class="page-top">
        <h1 class="page-title">Product List</h1>
        <a class="back-link" href="index.html">← Back to categories</a>
      </div>

      <!-- FILTER BUTTONS (08.02 filter) -->
      <div class="filters" aria-label="Filter by gender">
        <button class="filter-btn is-active" type="button">All</button>
        <button class="filter-btn" type="button">Men</button>
        <button class="filter-btn" type="button">Women</button>
        <button class="filter-btn" type="button">Unisex</button>
      </div>

      <!-- Products grid (JS inserts product cards here) -->
      <section class="product-grid" aria-label="Products"></section>

      <!-- Template for 1 product card -->
      <template id="product-card-template">
        <article class="product-card">
          <div class="product-badges"></div>

          <div class="product-image-wrap">
            <img class="product-image" src="" alt="" />
          </div>

          <div class="product-body">
            <h2 class="product-name"></h2>

            <p class="product-meta">
              <span class="product-brand"></span>
              <span class="dot">•</span>
              <span class="product-season"></span>
            </p>

            <p class="product-price">
              <span class="price-now"></span>
              <span class="price-old"></span>
            </p>

            <a class="see-product" href="#">See product</a>
          </div>
        </article>
      </template>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>FashionRus • Benjamin Jaffe Aamann</small>
        <a href="#top">To the top</a>
      </div>
    </footer>

    <script src="productlist.js"></script>
  </body>
</html>
