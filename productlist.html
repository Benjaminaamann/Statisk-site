<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product List</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-left">
        <button class="filter-toggle">ALL FILTERS</button>

        <nav class="main-nav">
          <a href="index.html">CATEGORIES</a>
          <a href="#">BRANDS</a>
          <a href="#">SEASONS</a>
        </nav>
      </div>

      <a class="logo" href="index.html"> FASHION<span>R</span>US </a>

      <div class="header-right">
        <button class="icon-btn">🔍</button>
        <button class="icon-btn">♡</button>
        <button class="icon-btn">🛒</button>
      </div>
    </header>

    <div class="filter-menu">
      <button class="filter-btn is-active">All</button>
      <button class="filter-btn">Men</button>
      <button class="filter-btn">Women</button>
      <button class="filter-btn">Unisex</button>
    </div>

    <div class="page-top">
      <h1 class="page-title"></h1>

      <a href="index.html">Back to categories</a>
    </div>

    <section class="product-grid"></section>

    <template id="product-card-template">
      <article class="product-card">
        <img class="product-image" />

        <h2 class="product-name"></h2>

        <p class="product-meta">
          <span class="product-brand"></span>
          <span class="product-season"></span>
        </p>

        <p class="product-price">
          <span class="price-now"></span>
          <span class="price-old"></span>
        </p>

        <a class="see-product">See product</a>
      </article>
    </template>

    <footer class="site-footer">
      <div class="newsletter">
        <input placeholder="E-MAIL" />
        <button>SIGN UP</button>
      </div>

      <div class="footer-bottom">
        <small>FashionRus • Benjamin Jaffe Aamann</small>
        <a href="#top">To the top</a>
      </div>
    </footer>

    <script src="header.js"></script>
    <script src="productlist.js"></script>
  </body>
</html>
